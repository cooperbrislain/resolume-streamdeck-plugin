<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Resolume Settings</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #2a2a2a;
      --border: #444;
      --text: #e0e0e0;
      --accent: #00cc44;
      --input-bg: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 10px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text);
    }
    input[type="number"],
    select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 12px;
      width: 100%;
    }
    select option { background: var(--input-bg); }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .status-dot.connected { background: var(--accent); }
    #status-text { font-size: 11px; color: #888; }
    .hint { font-size: 11px; color: #666; margin-top: 4px; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <!-- Keypad button settings -->
  <div id="keypad-section" class="section" hidden>
    <h3>Clip</h3>
    <label>
      Layer (row)
      <input type="number" id="layer" placeholder="1" min="1" max="64" />
    </label>
    <label>
      Clip (column)
      <input type="number" id="clip" placeholder="1" min="1" max="255" />
    </label>
  </div>

  <!-- Encoder (dial) settings -->
  <div id="encoder-section" class="section" hidden>
    <h3>Dial Assignment</h3>
    <label>
      Dashboard parameter
      <select id="paramId">
        <option value="">— Unassigned —</option>
      </select>
    </label>
    <p class="hint" id="param-hint"></p>
  </div>

  <!-- Connection status (always visible) -->
  <div class="section">
    <h3>Resolume Connection</h3>
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Not connected</span>
    </div>
  </div>

  <script src="inspector.js"></script>
</body>
</html>
