<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deck Navigator</title>
  <link rel="stylesheet" href="shared/pi.css" />
</head>
<body>
  <div class="section">
    <h3>Display Label</h3>
    <label>
      <input type="text" id="label" placeholder="e.g. Decks" maxlength="20" />
      <span class="hint">Optional. If set, shown as the dial title — the active deck name becomes the value beneath it. Leave blank to show the deck name as the title.</span>
    </label>
  </div>
  <div class="section">
    <h3>Resolume Connection</h3>
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Not connected</span>
    </div>
  </div>
  <script src="shared/pi-core.js"></script>
  <script src="bank.js"></script>
</body>
</html>
